name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  repository_dispatch:
    types: [schema-updated]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install pet-schema (peer-dep, per compatibility_matrix 2026.11)
        run: pip install 'pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v3.3.0'

      - name: Install pet-infra (peer-dep, per compatibility_matrix 2026.09)
        run: pip install 'pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v2.6.0'

      - name: Install pet-train (editable, no-deps over peer-deps)
        run: pip install -e . --no-deps

      - name: Re-resolve dev extras
        run: pip install -e ".[dev]"

      - name: Assert peer-dep versions (§11.4)
        run: |
          python -c "
          import importlib.metadata
          import pet_infra
          from pet_schema.version import SCHEMA_VERSION
          schema_v = importlib.metadata.version('pet-schema')
          assert schema_v == '3.3.0', f'unexpected pet_schema version {schema_v}'
          assert SCHEMA_VERSION == '3.3.0', f'SCHEMA_VERSION drift: {SCHEMA_VERSION}'
          assert pet_infra.__version__.startswith('2.6.'), f'unexpected pet_infra version {pet_infra.__version__}'
          print('peer-dep versions OK: pet_schema', schema_v, ', pet_infra', pet_infra.__version__)
          "

      - name: Lint
        run: ruff check src/ tests/ && mypy src/

      - name: Detect GPU
        id: gpu
        run: |
          if python -c "import torch; assert torch.cuda.is_available()" 2>/dev/null; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Test
        run: |
          if [ "${{ steps.gpu.outputs.available }}" = "true" ]; then
            pytest tests/ -v --tb=short
          else
            pytest tests/ -v --tb=short -m "not gpu"
          fi
