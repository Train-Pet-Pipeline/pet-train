### PANNs MobileNetV2 Transfer Learning Configuration

model:
  backbone: "MobileNetV2"
  pretrained_path: "data/pretrained/MobileNetV2_mAP=0.383.pth"
  num_classes: 5
  freeze_backbone: true
  unfreeze_last_n: 0

training:
  batch_size: 32
  learning_rate: 1.0e-3
  max_epochs: 50
  early_stopping_patience: 10
  optimizer: adam
  scheduler: cosine

augmentation:
  spec_augment: true
  time_mask_param: 20
  freq_mask_param: 10
  random_gain_db: 6.0
