### LLaMA-Factory SFT Base Configuration
### Inheritable by experiment configs in configs/experiments/

# Model
model_name_or_path: Qwen/Qwen2-VL-2B-Instruct
trust_remote_code: true
template: qwen2_vl

# LoRA
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: q_proj,v_proj
freeze_vision_tower: true

# Training
do_train: true
cutoff_len: 4096
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
# VLM 大词表 (~152K) 下 label_smoothing > 0 会触发 log_softmax 全词表计算,
# 导致显存爆炸 (RTX 5090 32GB OOM). 详见摩擦点 #12.
label_smoothing_factor: 0.0

# Data
dataset_dir: data/
dataset: pet_sft_train

# Logging
report_to: wandb
logging_steps: 10
save_steps: 500
